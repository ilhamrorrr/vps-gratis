name: Windows RDP via localhost.run

on:
  workflow_dispatch:
    inputs:
      rdp_duration:
        description: 'Durasi sesi dalam menit (max 350)'
        required: false
        default: '350'

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:

      - name: Generate & Set Password
        shell: powershell
        run: |
          $chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789'
          $random = -join ((1..12) | ForEach-Object { $chars[(Get-Random -Maximum $chars.Length)] })
          $password = "Rdp@" + $random
          echo "RDP_PASS=$password" >> $env:GITHUB_ENV
          net user runneradmin $password
          Write-Host "=========================================="
          Write-Host "[+] Username : runneradmin"
          Write-Host "[+] Password : $password"
          Write-Host "=========================================="

      - name: Enable Remote Desktop
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "runneradmin" -ErrorAction SilentlyContinue
          Write-Host "[+] Remote Desktop aktif"

      - name: Start localhost.run Tunnel
        shell: powershell
        run: |
          $sshDir = "$env:USERPROFILE\.ssh"
          New-Item -ItemType Directory -Force -Path $sshDir | Out-Null
          ssh-keygen -t rsa -b 2048 -f "$sshDir\id_rsa" -N '""' -q
          Write-Host "[+] SSH key dibuat"

          $logFile = "C:\lhr.log"
          $errFile = "C:\lhr-err.log"
          New-Item -ItemType File -Force -Path $logFile | Out-Null
          New-Item -ItemType File -Force -Path $errFile | Out-Null

          Write-Host "[*] Memulai tunnel ke localhost.run..."

          $sshArgs = "-o StrictHostKeyChecking=no -o UserKnownHostsFile=NUL -o ServerAliveInterval=20 -R 3389:localhost:3389 nokey@localhost.run"
          Start-Process -FilePath "ssh" -ArgumentList $sshArgs -RedirectStandardOutput $logFile -RedirectStandardError $errFile -WindowStyle Hidden -PassThru

          Write-Host "[*] Menunggu tunnel aktif..."

          $maxWait = 40
          $elapsed = 0
          $tunnelInfo = ""

          while ($elapsed -lt $maxWait) {
            Start-Sleep -Seconds 2
            $elapsed = $elapsed + 2

            $logContent = Get-Content $logFile -Raw -ErrorAction SilentlyContinue
            $errContent = Get-Content $errFile -Raw -ErrorAction SilentlyContinue
            $combined = "$logContent $errContent"

            # localhost.run format: tunneled with tls termination, https://xxxxx.localhost.run
            if ($combined -match "tunneled.*?([a-z0-9\-]+\.localhost\.run)") {
              $tunnelInfo = $Matches[1]
              break
            }
            if ($combined -match "([a-z0-9\-]+\.localhost\.run)") {
              $tunnelInfo = $Matches[1]
              break
            }

            Write-Host "menunggu tunnel... ($elapsed/$maxWait detik)"
          }

          $rdpPass = $env:RDP_PASS

          if ($tunnelInfo -ne "") {
            echo "TUNNEL_HOST=$tunnelInfo" >> $env:GITHUB_ENV
            Write-Host ""
            Write-Host "===================================================="
            Write-Host "        INFORMASI KONEKSI RDP"
            Write-Host "===================================================="
            Write-Host "  Tunnel Host : $tunnelInfo"
            Write-Host "  Port        : 3389"
            Write-Host "  Username    : runneradmin"
            Write-Host "  Password    : $rdpPass"
            Write-Host "===================================================="
            Write-Host "  Di Microsoft Remote Desktop:"
            Write-Host "  PC Name  -> $tunnelInfo`:3389"
            Write-Host "  Username -> runneradmin"
            Write-Host "  Password -> $rdpPass"
            Write-Host "===================================================="
          } else {
            Write-Host ""
            Write-Host "[!] Tunnel tidak terdeteksi. Log:"
            Get-Content $logFile -ErrorAction SilentlyContinue
            Get-Content $errFile -ErrorAction SilentlyContinue
            Write-Host ""
            Write-Host "  Username : runneradmin"
            Write-Host "  Password : $rdpPass"
          }

      - name: Keep Session Alive
        shell: powershell
        run: |
          $inputDuration = "${{ github.event.inputs.rdp_duration }}"
          $duration = [int]$inputDuration
          if ($duration -lt 1 -or $duration -gt 350) {
            $duration = 350
          }

          $endTime = (Get-Date).AddMinutes($duration)
          $tunnelHost = $env:TUNNEL_HOST
          $rdpPass = $env:RDP_PASS

          Write-Host "[*] Sesi aktif selama $duration menit"
          Write-Host "[*] Username : runneradmin"
          Write-Host "[*] Password : $rdpPass"
          Write-Host "[*] Host     : $tunnelHost"
          Write-Host "[*] Port     : 3389"
          Write-Host ""

          while ((Get-Date) -lt $endTime) {
            $remaining = [math]::Round(($endTime - (Get-Date)).TotalMinutes, 1)
            $now = Get-Date -Format "HH:mm:ss"
            Write-Host "$now | Sisa: $remaining menit | $tunnelHost`:3389 | Pass: $rdpPass"
            Start-Sleep -Seconds 60
          }

          Write-Host "[!] Sesi selesai."
