name: Windows Desktop via Browser (Guacamole)

on:
  workflow_dispatch:
    inputs:
      ngrok_token:
        description: 'Ngrok Authtoken (ngrok.com - GRATIS, no kartu)'
        required: true
      session_duration:
        description: 'Durasi sesi menit (max 350)'
        required: false
        default: '350'

jobs:
  desktop:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:

      - name: Set Password
        shell: powershell
        run: |
          $chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789'
          $random = -join ((1..12) | ForEach-Object { $chars[(Get-Random -Maximum $chars.Length)] })
          $password = "Rdp@" + $random
          echo "RDP_PASS=$password" >> $env:GITHUB_ENV
          net user runneradmin $password
          Write-Host "=========================================="
          Write-Host "[+] Username : runneradmin"
          Write-Host "[+] Password : $password"
          Write-Host "=========================================="

      - name: Enable RDP
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "runneradmin" -ErrorAction SilentlyContinue
          Write-Host "[+] RDP aktif di port 3389"

      - name: Install Docker Desktop
        shell: powershell
        run: |
          Write-Host "[*] Enable WSL2 + Hyper-V..."
          Enable-WindowsOptionalFeature -Online -FeatureName Microsoft-Windows-Subsystem-Linux -NoRestart -ErrorAction SilentlyContinue
          Enable-WindowsOptionalFeature -Online -FeatureName VirtualMachinePlatform -NoRestart -ErrorAction SilentlyContinue

          Write-Host "[*] Install Docker via choco..."
          choco install -y docker-desktop --no-progress 2>$null

          # Cek docker
          $dockerPath = "C:\Program Files\Docker\Docker\Docker Desktop.exe"
          if (Test-Path $dockerPath) {
            Write-Host "[+] Docker Desktop terinstall"
          } else {
            Write-Host "[!] Docker Desktop tidak ditemukan, coba install docker engine..."
            choco install -y docker-engine --no-progress 2>$null
          }

      - name: Run Guacamole via Docker
        shell: powershell
        run: |
          Write-Host "[*] Memulai Docker..."
          Start-Service docker -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 10

          $rdpPass = $env:RDP_PASS
          $rdpHost = "host.docker.internal"

          Write-Host "[*] Menjalankan Guacamole container..."

          # Jalankan guacamole all-in-one
          docker run -d --name guacamole -p 8080:8080 `
            -e GUACD_HOSTNAME=localhost `
            -e POSTGRES_HOSTNAME=localhost `
            oznu/guacamole 2>$null

          if ($LASTEXITCODE -ne 0) {
            Write-Host "[*] Coba image alternatif..."
            docker run -d --name guac -p 8080:8080 `
              -e "WEBAPP_CONTEXT=ROOT" `
              maxwaldorf/guacamole 2>$null
          }

          Start-Sleep -Seconds 15
          Write-Host "[+] Guacamole seharusnya running di port 8080"

      - name: Start Ngrok HTTP Tunnel
        shell: powershell
        run: |
          $token = "${{ github.event.inputs.ngrok_token }}"
          $rdpPass = $env:RDP_PASS

          Write-Host "[*] Setup Ngrok..."
          $ngrokZip = "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip"
          Invoke-WebRequest -Uri $ngrokZip -OutFile "$env:TEMP\ngrok.zip" -UseBasicParsing
          New-Item -ItemType Directory -Force -Path "C:\ngrok" | Out-Null
          Expand-Archive -Path "$env:TEMP\ngrok.zip" -DestinationPath "C:\ngrok" -Force

          C:\ngrok\ngrok.exe config add-authtoken $token
          Start-Process -FilePath "C:\ngrok\ngrok.exe" -ArgumentList "http 8080" -WindowStyle Hidden
          Start-Sleep -Seconds 5

          $maxWait = 30
          $elapsed = 0
          $publicUrl = ""

          while ($elapsed -lt $maxWait) {
            Start-Sleep -Seconds 2
            $elapsed = $elapsed + 2
            try {
              $resp = Invoke-RestMethod -Uri "http://localhost:4040/api/tunnels" -ErrorAction Stop
              if ($resp.tunnels.Count -gt 0) {
                $publicUrl = $resp.tunnels[0].public_url
                break
              }
            } catch {
              Write-Host "menunggu Ngrok... ($elapsed/$maxWait detik)"
            }
          }

          if ($publicUrl -ne "") {
            echo "BROWSER_URL=$publicUrl" >> $env:GITHUB_ENV
            Write-Host ""
            Write-Host "===================================================="
            Write-Host "   BUKA URL INI DI BROWSER HP!"
            Write-Host "===================================================="
            Write-Host "  $publicUrl"
            Write-Host ""
            Write-Host "  Login Guacamole:"
            Write-Host "  User     : guacadmin"
            Write-Host "  Password : guacadmin"
            Write-Host ""
            Write-Host "  Setelah login, tambah koneksi RDP:"
            Write-Host "  Host     : host.docker.internal"
            Write-Host "  Port     : 3389"
            Write-Host "  Username : runneradmin"
            Write-Host "  Password : $rdpPass"
            Write-Host "===================================================="
          } else {
            Write-Host "[!] Ngrok URL tidak muncul. Cek authtoken."
            Write-Host "  Password Windows: $rdpPass"
          }

      - name: Keep Session Alive
        shell: powershell
        run: |
          $duration = 350
          try {
            $inp = "${{ github.event.inputs.session_duration }}"
            $duration = [int]$inp
            if ($duration -lt 1 -or $duration -gt 350) { $duration = 350 }
          } catch {}

          $endTime = (Get-Date).AddMinutes($duration)
          $browserUrl = $env:BROWSER_URL
          $rdpPass = $env:RDP_PASS

          Write-Host "[*] Sesi aktif $duration menit"
          Write-Host "[*] URL Browser : $browserUrl"
          Write-Host "[*] Pass Windows: $rdpPass"
          Write-Host ""

          while ((Get-Date) -lt $endTime) {
            $remaining = [math]::Round(($endTime - (Get-Date)).TotalMinutes, 1)
            $now = Get-Date -Format "HH:mm:ss"
            Write-Host "$now | Sisa: $remaining menit | $browserUrl"
            Start-Sleep -Seconds 60
          }

          Write-Host "[!] Sesi selesai."
