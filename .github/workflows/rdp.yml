name: Windows RDP Backtest via serveo.net

on:
  workflow_dispatch:
    inputs:
      rdp_duration:
        description: 'Durasi sesi dalam menit (max 350)'
        required: false
        default: '350'

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:

      - name: Generate & Set Password
        shell: powershell
        run: |
          $chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789'
          $random = -join ((1..12) | ForEach-Object { $chars[(Get-Random -Maximum $chars.Length)] })
          $password = "Rdp@" + $random
          echo "RDP_PASS=$password" >> $env:GITHUB_ENV
          net user runneradmin $password
          Write-Host "=========================================="
          Write-Host "[+] Username : runneradmin"
          Write-Host "[+] Password : $password"
          Write-Host "=========================================="

      - name: Enable Remote Desktop
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "runneradmin" -ErrorAction SilentlyContinue
          Write-Host "[+] Remote Desktop aktif"

      - name: Setup SSH Key & Start serveo Tunnel
        shell: powershell
        run: |
          Write-Host "[*] Membuat SSH key..."

          $sshDir = "$env:USERPROFILE\.ssh"
          New-Item -ItemType Directory -Force -Path $sshDir | Out-Null

          # Generate SSH key tanpa passphrase
          ssh-keygen -t rsa -b 2048 -f "$sshDir\id_rsa" -N '""' -q

          # Disable strict host checking
          $sshConfig = "Host serveo.net`n  StrictHostKeyChecking no`n  UserKnownHostsFile /dev/null`n  ServerAliveInterval 30`n  ServerAliveCountMax 10`n"
          $sshConfig | Out-File -FilePath "$sshDir\config" -Encoding ascii

          Write-Host "[+] SSH key berhasil dibuat"
          Write-Host "[*] Memulai tunnel ke serveo.net..."

          $logFile = "C:\serveo.log"
          New-Item -ItemType File -Force -Path $logFile | Out-Null

          # Jalankan SSH tunnel ke serveo.net port 3389
          $sshArgs = "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -R 0:localhost:3389 serveo.net"
          Start-Process -FilePath "ssh" -ArgumentList $sshArgs -RedirectStandardOutput $logFile -RedirectStandardError "C:\serveo-err.log" -WindowStyle Hidden

          Write-Host "[*] Menunggu tunnel aktif..."

          $maxWait = 40
          $elapsed = 0
          $port = ""

          while ($elapsed -lt $maxWait) {
            Start-Sleep -Seconds 2
            $elapsed = $elapsed + 2

            $logContent = Get-Content $logFile -Raw -ErrorAction SilentlyContinue
            $errContent = Get-Content "C:\serveo-err.log" -Raw -ErrorAction SilentlyContinue
            $combined = "$logContent $errContent"

            if ($combined -match "Allocated port (\d+)") {
              $port = $Matches[1]
              break
            }
            if ($combined -match "forwarding.*?(\d{4,5})") {
              $port = $Matches[1]
              break
            }

            Write-Host "menunggu tunnel serveo... ($elapsed/$maxWait detik)"
          }

          $rdpPass = $env:RDP_PASS

          if ($port -ne "") {
            $rdpAddress = "serveo.net:$port"
            echo "RDP_ADDRESS=$rdpAddress" >> $env:GITHUB_ENV
            echo "RDP_PORT=$port" >> $env:GITHUB_ENV

            Write-Host ""
            Write-Host "===================================================="
            Write-Host "        INFORMASI KONEKSI RDP"
            Write-Host "===================================================="
            Write-Host "  Alamat RDP  : $rdpAddress"
            Write-Host "  Host        : serveo.net"
            Write-Host "  Port        : $port"
            Write-Host "  Username    : runneradmin"
            Write-Host "  Password    : $rdpPass"
            Write-Host "===================================================="
            Write-Host "  Di Microsoft Remote Desktop:"
            Write-Host "  PC Name  -> serveo.net:$port"
            Write-Host "  Username -> runneradmin"
            Write-Host "  Password -> $rdpPass"
            Write-Host "===================================================="
          } else {
            Write-Host ""
            Write-Host "[!] Port tidak terdeteksi. Log serveo:"
            Get-Content $logFile -ErrorAction SilentlyContinue
            Get-Content "C:\serveo-err.log" -ErrorAction SilentlyContinue
            Write-Host ""
            Write-Host "  Username : runneradmin"
            Write-Host "  Password : $rdpPass"
          }

      - name: Keep Session Alive
        shell: powershell
        run: |
          $inputDuration = "${{ github.event.inputs.rdp_duration }}"
          $duration = [int]$inputDuration
          if ($duration -lt 1 -or $duration -gt 350) {
            $duration = 350
          }

          $endTime = (Get-Date).AddMinutes($duration)
          $rdpAddress = $env:RDP_ADDRESS
          $rdpPass = $env:RDP_PASS

          Write-Host "[*] Sesi aktif selama $duration menit"
          Write-Host "[*] Username : runneradmin"
          Write-Host "[*] Password : $rdpPass"
          Write-Host "[*] Alamat   : $rdpAddress"
          Write-Host ""

          while ((Get-Date) -lt $endTime) {
            $remaining = [math]::Round(($endTime - (Get-Date)).TotalMinutes, 1)
            $now = Get-Date -Format "HH:mm:ss"
            Write-Host "$now | Sisa: $remaining menit | $rdpAddress | Pass: $rdpPass"
            Start-Sleep -Seconds 60
          }

          Write-Host "[!] Sesi selesai."
