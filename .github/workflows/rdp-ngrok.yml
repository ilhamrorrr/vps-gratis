name: Windows RDP Backtest via bore.pub

on:
  workflow_dispatch:
    inputs:
      rdp_duration:
        description: 'Durasi sesi dalam menit (max 350)'
        required: false
        default: '350'

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:

      - name: Generate & Set Password
        shell: powershell
        run: |
          $chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789'
          $random = -join ((1..12) | ForEach-Object { $chars[(Get-Random -Maximum $chars.Length)] })
          $password = "Rdp@" + $random
          echo "RDP_PASS=$password" >> $env:GITHUB_ENV
          net user runneradmin $password
          Write-Host "=========================================="
          Write-Host "[+] Username : runneradmin"
          Write-Host "[+] Password : $password"
          Write-Host "=========================================="

      - name: Enable Remote Desktop
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "runneradmin" -ErrorAction SilentlyContinue
          Write-Host "[+] Remote Desktop aktif"

      - name: Install bore & Start RDP Tunnel
        shell: powershell
        run: |
          Write-Host "[*] Mengunduh bore..."

          $boreUrl = "https://github.com/ekzhang/bore/releases/latest/download/bore-v0.5.0-x86_64-pc-windows-msvc.zip"
          $zipPath = "$env:TEMP\bore.zip"
          $destPath = "C:\bore"

          New-Item -ItemType Directory -Force -Path $destPath | Out-Null

          try {
            Invoke-WebRequest -Uri $boreUrl -OutFile $zipPath -UseBasicParsing
            Expand-Archive -Path $zipPath -DestinationPath $destPath -Force
            Write-Host "[+] bore berhasil diinstall"
          } catch {
            Write-Host "[!] Download bore gagal, mencoba URL alternatif..."
            $boreUrl2 = "https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-x86_64-pc-windows-msvc.zip"
            Invoke-WebRequest -Uri $boreUrl2 -OutFile $zipPath -UseBasicParsing
            Expand-Archive -Path $zipPath -DestinationPath $destPath -Force
            Write-Host "[+] bore berhasil diinstall (URL alternatif)"
          }

          $boreExe = Get-ChildItem -Path $destPath -Filter "bore.exe" -Recurse | Select-Object -First 1
          if ($null -eq $boreExe) {
            Write-Error "[!] bore.exe tidak ditemukan setelah extract"
            Get-ChildItem $destPath
            exit 1
          }

          $borePath = $boreExe.FullName
          Write-Host "[+] bore.exe ditemukan: $borePath"

          $logFile = "C:\bore\bore.log"
          New-Item -ItemType File -Force -Path $logFile | Out-Null

          Write-Host "[*] Memulai tunnel RDP ke bore.pub..."

          Start-Process -FilePath $borePath `
            -ArgumentList "local 3389 --to bore.pub" `
            -RedirectStandardOutput $logFile `
            -RedirectStandardError "C:\bore\bore-err.log" `
            -WindowStyle Hidden

          Write-Host "[*] Menunggu tunnel aktif..."

          $maxWait = 30
          $elapsed = 0
          $port = ""

          while ($elapsed -lt $maxWait) {
            Start-Sleep -Seconds 2
            $elapsed = $elapsed + 2

            $logContent = Get-Content $logFile -Raw -ErrorAction SilentlyContinue
            $errContent = Get-Content "C:\bore\bore-err.log" -Raw -ErrorAction SilentlyContinue
            $combined = "$logContent $errContent"

            if ($combined -match "listening at bore\.pub:(\d+)") {
              $port = $Matches[1]
              break
            }
            if ($combined -match "bore\.pub:(\d+)") {
              $port = $Matches[1]
              break
            }
            if ($combined -match "remote_port.*?(\d{4,5})") {
              $port = $Matches[1]
              break
            }

            Write-Host "menunggu tunnel... ($elapsed/$maxWait detik)"
          }

          $rdpPass = $env:RDP_PASS

          if ($port -ne "") {
            $rdpAddress = "bore.pub:$port"
            echo "RDP_ADDRESS=$rdpAddress" >> $env:GITHUB_ENV
            echo "RDP_PORT=$port" >> $env:GITHUB_ENV

            Write-Host ""
            Write-Host "===================================================="
            Write-Host "        INFORMASI KONEKSI RDP"
            Write-Host "===================================================="
            Write-Host "  Alamat RDP  : $rdpAddress"
            Write-Host "  Host        : bore.pub"
            Write-Host "  Port        : $port"
            Write-Host "  Username    : runneradmin"
            Write-Host "  Password    : $rdpPass"
            Write-Host "===================================================="
            Write-Host "  Cara connect di Android (RD Client / Microsoft RD):"
            Write-Host "  1. Install 'Microsoft Remote Desktop' dari PlayStore"
            Write-Host "  2. Add PC -> PC name: bore.pub:$port"
            Write-Host "  3. Username: runneradmin"
            Write-Host "  4. Password: $rdpPass"
            Write-Host "===================================================="
          } else {
            Write-Host ""
            Write-Host "[!] Port tidak terdeteksi otomatis. Log bore:"
            Get-Content $logFile -ErrorAction SilentlyContinue
            Get-Content "C:\bore\bore-err.log" -ErrorAction SilentlyContinue
            Write-Host ""
            Write-Host "  Username : runneradmin"
            Write-Host "  Password : $rdpPass"
          }

      - name: Keep Session Alive
        shell: powershell
        run: |
          $inputDuration = "${{ github.event.inputs.rdp_duration }}"
          $duration = [int]$inputDuration
          if ($duration -lt 1 -or $duration -gt 350) {
            $duration = 350
          }

          $endTime = (Get-Date).AddMinutes($duration)
          $rdpAddress = $env:RDP_ADDRESS
          $rdpPass = $env:RDP_PASS

          Write-Host "[*] Sesi aktif selama $duration menit (backtest mode)"
          Write-Host "[*] Username : runneradmin"
          Write-Host "[*] Password : $rdpPass"
          Write-Host "[*] Alamat   : $rdpAddress"
          Write-Host ""

          while ((Get-Date) -lt $endTime) {
            $remaining = [math]::Round(($endTime - (Get-Date)).TotalMinutes, 1)
            $now = Get-Date -Format "HH:mm:ss"
            Write-Host "$now | Sisa: $remaining menit | $rdpAddress | Pass: $rdpPass"
            Start-Sleep -Seconds 60
          }

          Write-Host "[!] Sesi selesai."
