name: Windows RDP via Ngrok

on:
  workflow_dispatch:
    inputs:
      ngrok_token:
        description: 'Ngrok Authtoken (atau gunakan secret NGROK_AUTH_TOKEN)'
        required: false
        default: ''
      rdp_duration:
        description: 'Durasi sesi RDP dalam menit (max 350)'
        required: false
        default: '60'

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:

      - name: Generate & Set Password for runneradmin
        shell: powershell
        run: |
          $chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*'
          $random = -join ((1..16) | ForEach-Object { $chars[(Get-Random -Maximum $chars.Length)] })
          $password = "Rdp@" + $random

          echo "RDP_PASS=$password" >> $env:GITHUB_ENV

          net user runneradmin $password

          Write-Host "=========================================="
          Write-Host "[+] Password runneradmin berhasil di-set"
          Write-Host "    Password : $password"
          Write-Host "=========================================="

      - name: Enable Remote Desktop
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "runneradmin" -ErrorAction SilentlyContinue
          Write-Host "[+] Remote Desktop telah diaktifkan"

      - name: Install Ngrok
        shell: powershell
        run: |
          $ngrokUrl = "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip"
          $zipPath = "$env:TEMP\ngrok.zip"
          $destPath = "C:\ngrok"

          Write-Host "[*] Mengunduh Ngrok..."
          Invoke-WebRequest -Uri $ngrokUrl -OutFile $zipPath -UseBasicParsing

          New-Item -ItemType Directory -Force -Path $destPath | Out-Null
          Expand-Archive -Path $zipPath -DestinationPath $destPath -Force

          echo "C:\ngrok" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          Write-Host "[+] Ngrok berhasil diinstall di $destPath"

      - name: Authenticate & Start Ngrok Tunnel
        shell: powershell
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          $inputToken = "${{ github.event.inputs.ngrok_token }}"
          $secretToken = $env:NGROK_AUTH_TOKEN

          if ($inputToken -ne "") {
            $token = $inputToken
          } else {
            $token = $secretToken
          }

          if ($token -eq "" -or $null -eq $token) {
            Write-Error "[!] NGROK_AUTH_TOKEN tidak ditemukan!"
            exit 1
          }

          C:\ngrok\ngrok.exe config add-authtoken $token
          Write-Host "[+] Ngrok authtoken berhasil dikonfigurasi"

          $ngrokArgs = "tcp 3389"
          Start-Process -FilePath "C:\ngrok\ngrok.exe" -ArgumentList $ngrokArgs -RedirectStandardOutput "$env:TEMP\ngrok.log" -WindowStyle Hidden
          Write-Host "[*] Ngrok process dimulai, menunggu tunnel aktif..."

          $maxWait = 30
          $elapsed = 0
          $tunnelReady = $false

          while ($elapsed -lt $maxWait) {
            Start-Sleep -Seconds 2
            $elapsed = $elapsed + 2
            try {
              $resp = Invoke-RestMethod -Uri "http://localhost:4040/api/tunnels" -ErrorAction Stop
              if ($resp.tunnels.Count -gt 0) {
                $tunnelReady = $true
                break
              }
            } catch {
              $msg = "menunggu Ngrok API... ($elapsed/$maxWait detik)"
              Write-Host $msg
            }
          }

          if (-not $tunnelReady) {
            Write-Host "[!] Log Ngrok:"
            Get-Content "$env:TEMP\ngrok.log" -ErrorAction SilentlyContinue | Select-Object -Last 20
            Write-Error "[!] Ngrok API tidak merespons setelah $maxWait detik."
            exit 1
          }

          Write-Host "[+] Ngrok tunnel aktif!"

      - name: Display RDP Connection Info
        shell: powershell
        run: |
          $tunnelData = Invoke-RestMethod -Uri "http://localhost:4040/api/tunnels"
          $tunnel = $tunnelData.tunnels | Select-Object -First 1
          $publicUrl = $tunnel.public_url
          $rdpAddress = $publicUrl -replace "tcp://", ""
          $parts = $rdpAddress.Split(":")
          $rdpHost = $parts[0]
          $rdpPort = $parts[1]
          $rdpPass = $env:RDP_PASS

          Write-Host ""
          Write-Host "===================================================="
          Write-Host "        INFORMASI KONEKSI RDP"
          Write-Host "===================================================="
          Write-Host "  Alamat RDP  : $rdpAddress"
          Write-Host "  Host        : $rdpHost"
          Write-Host "  Port        : $rdpPort"
          Write-Host "  Username    : ilhamrunneradmin"
          Write-Host "  Password    : $rdpPass"
          Write-Host "===================================================="
          Write-Host "  Cara connect (Windows):"
          Write-Host "  1. Win+R -> ketik: mstsc"
          Write-Host "  2. Computer: $rdpAddress"
          Write-Host "  3. Klik Connect -> masukkan kredensial di atas"
          Write-Host "===================================================="
          Write-Host ""

          echo "RDP_ADDRESS=$rdpAddress" >> $env:GITHUB_ENV

      - name: Keep Session Alive
        shell: powershell
        run: |
          $inputDuration = "${{ github.event.inputs.rdp_duration }}"
          $duration = [int]$inputDuration
          if ($duration -lt 1 -or $duration -gt 350) {
            $duration = 60
          }

          $endTime = (Get-Date).AddMinutes($duration)
          $rdpAddress = $env:RDP_ADDRESS

          Write-Host "[*] Sesi RDP akan aktif selama $duration menit"
          Write-Host "[*] Akan berakhir pada: $endTime"
          Write-Host "[*] Alamat RDP: $rdpAddress"
          Write-Host ""

          while ((Get-Date) -lt $endTime) {
            $remaining = [math]::Round(($endTime - (Get-Date)).TotalMinutes, 1)
            $now = Get-Date -Format "HH:mm:ss"
            Write-Host "$now | Sisa waktu: $remaining menit | RDP: $rdpAddress"
            Start-Sleep -Seconds 60
          }

          Write-Host ""
          Write-Host "[!] Sesi RDP telah berakhir."
