name: OBET-VPS-ANTI-ERROR
on: workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Install Ngrok
      run: choco install ngrok
    - name: Authenticate Ngrok
      run: ngrok authtoken 3DAl4o6ASNnyJianbboXorSyj2E_3zi3EFadjDsDcoMB2RMiD
    - name: Aktifkan RDP
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
    - name: Set Password User
      # Kita pake 'continue-on-error' biar kalau Windows ngomel, proses tetep lanjut!
      continue-on-error: true
      run: |
        net user runneradmin ObetGanteng1
        net localgroup administrators runneradmin /add
    - name: Jalankan Terowongan
      run: Start-Process ngrok -ArgumentList "tcp 3389"
    - name: Ambil Alamat RDP (Sambil Nunggu)
      run: |
        Write-Host "Lagi nyari jalur tikus, tungguin bentar Cok..."
        $n = 10
        while($n -gt 0) {
          try {
            $response = curl http://localhost:4040/api/tunnels -ErrorAction Stop | ConvertFrom-Json
            $url = $response.tunnels[0].public_url
            if ($url) {
              Write-Host "`n--- SALIN ALAMAT INI COK ---"
              Write-Host $url
              Write-Host "----------------------------`n"
              break
            }
          } catch {
            Write-Host "Ngrok belum bangun... sisa nyawa: $n"
            Start-Sleep -Seconds 5
            $n--
          }
        }
    - name: Jaga VPS Tetap Hidup
      run: Start-Sleep -Seconds 21600
